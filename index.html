<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="calculator-container">
        <div class="display">
            <div class="display-input">0</div>
        </div>
        <div class="buttons">
            <button class="clear-button">C</button>
            <button class="regular-buttons">.</button>
            <button class="regular-buttons">⌫</button>
            <button class="regular-buttons">1</button>
            <button class="regular-buttons">2</button>
            <button class="regular-buttons">+</button>
            <button class="regular-buttons">3</button>
            <button class="regular-buttons">4</button>
            <button class="regular-buttons">-</button>
            <button class="regular-buttons">5</button>
            <button class="regular-buttons">6</button>
            <button class="regular-buttons">*</button>
            <button class="regular-buttons">7</button>
            <button class="regular-buttons">8</button>
            <button class="regular-buttons">/</button>
            <button class="regular-buttons">9</button>
            <button class="regular-buttons">0</button>
            <button class="regular-buttons">=</button>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="calculator-container">
        <div class="display">
            <div class="display-input">0</div>
        </div>
        <div class="buttons">
            <button class="clear-button clear" id="clear-button">C</button>
            <button class="regular-buttons decimal">.</button>
            <button class="regular-buttons delete">⌫</button>
            <button class="regular-buttons digit">1</button>
            <button class="regular-buttons digit">2</button>
            <button class="regular-buttons operator">+</button>
            <button class="regular-buttons digit">3</button>
            <button class="regular-buttons digit">4</button>
            <button class="regular-buttons operator">-</button>
            <button class="regular-buttons digit">5</button>
            <button class="regular-buttons digit">6</button>
            <button class="regular-buttons operator">*</button>
            <button class="regular-buttons digit">7</button>
            <button class="regular-buttons digit">8</button>
            <button class="regular-buttons operator">/</button>
            <button class="regular-buttons digit">9</button>
            <button class="regular-buttons digit">0</button>
            <button class="regular-buttons equals">=</button>
        </div>
    </div>
</body>
</html>
